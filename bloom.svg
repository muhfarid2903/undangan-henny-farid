<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 280" width="380" height="280">
  <defs>
    <ellipse id="p" cx="0" cy="-24" rx="12" ry="23"/>
    <ellipse id="ps" cx="0" cy="-16" rx="8" ry="15"/>
    <g id="leaf"><path d="M0 0 Q 26 -22 60 -10 Q 28 -4 0 0 Z"/></g>
    <g id="flower6">
      <use href="#p" transform="rotate(0)"/><use href="#p" transform="rotate(60)"/>
      <use href="#p" transform="rotate(120)"/><use href="#p" transform="rotate(180)"/>
      <use href="#p" transform="rotate(240)"/><use href="#p" transform="rotate(300)"/>
    </g>
    <g id="flower5">
      <use href="#ps" transform="rotate(0)"/><use href="#ps" transform="rotate(72)"/>
      <use href="#ps" transform="rotate(144)"/><use href="#ps" transform="rotate(216)"/>
      <use href="#ps" transform="rotate(288)"/>
    </g>
  </defs>

  <!-- stems -->
  <g fill="none" stroke="#8a9a64" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <path d="M70 280 Q 58 210 80 184"/>
    <path d="M132 280 Q 144 222 124 200"/>
    <path d="M44 280 Q 34 224 52 188"/>
    <path d="M186 280 Q 200 232 176 214"/>
  </g>

  <!-- leaves -->
  <g fill="#7e9054" opacity="0.78">
    <use href="#leaf" transform="translate(150 216) rotate(8)"/>
    <use href="#leaf" transform="translate(96 230) scale(-0.9 0.9) rotate(6)"/>
    <use href="#leaf" transform="translate(28 200) scale(-0.8 0.8)"/>
    <use href="#leaf" transform="translate(196 226) rotate(16)"/>
    <use href="#leaf" transform="translate(118 250) scale(0.8) rotate(-10)"/>
  </g>
  <g fill="#9aac6e" opacity="0.65">
    <use href="#leaf" transform="translate(70 250) scale(0.7) rotate(-4)"/>
    <use href="#leaf" transform="translate(168 244) scale(-0.7 0.7)"/>
  </g>

  <!-- gold sprigs -->
  <g stroke="#c6ad77" stroke-width="1.4" fill="#c6ad77" opacity="0.85">
    <path d="M160 232 q 34 -18 64 -12" fill="none"/>
    <circle cx="216" cy="221" r="3"/><circle cx="196" cy="226" r="2.4"/><circle cx="178" cy="230" r="2.2"/>
    <path d="M16 230 q -10 -28 4 -54" fill="none"/>
    <circle cx="14" cy="184" r="2.6"/><circle cx="18" cy="200" r="2.2"/>
    <path d="M214 250 q 14 -20 6 -44" fill="none"/>
    <circle cx="218" cy="206" r="2.4"/>
  </g>

  <!-- flowers (krem/sage) -->
  <use href="#flower6" transform="translate(74 186)" fill="#e7e2cd" fill-opacity="0.72"/>
  <circle cx="74" cy="186" r="11" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#flower6" transform="translate(134 204) scale(0.84) rotate(20)" fill="#cfd6b3" fill-opacity="0.7"/>
  <circle cx="134" cy="204" r="9" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#flower6" transform="translate(184 220) scale(0.74) rotate(-12)" fill="#bcc99c" fill-opacity="0.7"/>
  <circle cx="184" cy="220" r="8" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#flower5" transform="translate(40 150) scale(0.74)" fill="#dfe0c4" fill-opacity="0.72"/>
  <circle cx="40" cy="150" r="7" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#flower5" transform="translate(210 200) scale(0.6)" fill="#e7e2cd" fill-opacity="0.7"/>
  <circle cx="210" cy="200" r="6" fill="#c6ad77" fill-opacity="0.95"/>

  <use href="#flower5" transform="translate(108 168) scale(0.5)" fill="#cfd6b3" fill-opacity="0.65"/>

  <!-- filler blossoms -->
  <g fill="#eceadb" opacity="0.85">
    <circle cx="170" cy="204" r="6"/><circle cx="22" cy="172" r="5"/>
    <circle cx="156" cy="232" r="4"/><circle cx="198" cy="244" r="4.5"/><circle cx="60" cy="214" r="4"/>
  </g>
  <g fill="#aebf8f" opacity="0.7">
    <circle cx="92" cy="200" r="3.5"/><circle cx="146" cy="216" r="3"/><circle cx="120" cy="190" r="3"/>
  </g>
</svg>
