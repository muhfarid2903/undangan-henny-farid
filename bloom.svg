<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260">
  <defs>
    <ellipse id="p" cx="0" cy="-24" rx="12" ry="23"/>
    <ellipse id="ps" cx="0" cy="-16" rx="8" ry="15"/>
    <g id="leaf">
      <path d="M0 0 Q 26 -22 60 -10 Q 28 -4 0 0 Z"/>
    </g>
  </defs>

  <!-- stems & leaves -->
  <g fill="none" stroke="#9aa17a" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <path d="M70 250 Q 60 200 78 180"/>
    <path d="M130 252 Q 140 215 122 198"/>
    <path d="M44 252 Q 36 210 50 184"/>
  </g>
  <g fill="#8f9b6f" opacity="0.75">
    <use href="#leaf" transform="translate(150 214) rotate(8)"/>
    <use href="#leaf" transform="translate(96 224) scale(-0.9 0.9) rotate(6)"/>
    <use href="#leaf" transform="translate(28 196) scale(-0.8 0.8)"/>
  </g>
  <!-- gold sprigs -->
  <g stroke="#c6ad77" stroke-width="1.4" fill="#c6ad77" opacity="0.85">
    <path d="M160 230 q 30 -16 58 -10" fill="none"/>
    <circle cx="208" cy="219" r="3"/><circle cx="190" cy="224" r="2.4"/><circle cx="174" cy="228" r="2.2"/>
    <path d="M16 228 q -10 -26 4 -50" fill="none"/>
    <circle cx="14" cy="184" r="2.6"/><circle cx="18" cy="200" r="2.2"/>
  </g>

  <!-- flower 1 (besar) -->
  <g transform="translate(74 188)" fill="#9b7fb0" fill-opacity="0.58">
    <use href="#p" transform="rotate(0)"/><use href="#p" transform="rotate(60)"/>
    <use href="#p" transform="rotate(120)"/><use href="#p" transform="rotate(180)"/>
    <use href="#p" transform="rotate(240)"/><use href="#p" transform="rotate(300)"/>
    <circle r="11" fill="#c6ad77" fill-opacity="0.95"/>
  </g>
  <!-- flower 2 -->
  <g transform="translate(132 205) scale(0.82)" fill="#bb8fce" fill-opacity="0.55">
    <use href="#p" transform="rotate(20)"/><use href="#p" transform="rotate(80)"/>
    <use href="#p" transform="rotate(140)"/><use href="#p" transform="rotate(200)"/>
    <use href="#p" transform="rotate(260)"/><use href="#p" transform="rotate(320)"/>
    <circle r="11" fill="#c6ad77" fill-opacity="0.95"/>
  </g>
  <!-- bud kecil -->
  <g transform="translate(40 150) scale(0.7)" fill="#7d6a99" fill-opacity="0.6">
    <use href="#ps" transform="rotate(0)"/><use href="#ps" transform="rotate(72)"/>
    <use href="#ps" transform="rotate(144)"/><use href="#ps" transform="rotate(216)"/>
    <use href="#ps" transform="rotate(288)"/>
    <circle r="7" fill="#c6ad77" fill-opacity="0.95"/>
  </g>
  <!-- aksen titik bunga kecil -->
  <g fill="#d8c4ea" opacity="0.8">
    <circle cx="170" cy="206" r="6"/><circle cx="22" cy="172" r="5"/>
  </g>
</svg>
